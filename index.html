<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <!-- css -->
     <link rel="stylesheet" href="style.css">
     <!-- font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awsome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
        <!-- daisy ui -->
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="geist">
    <div class="grid m-6 ">
 <div class=" border-2  mx-auto rounded-lg p-4 ">
    <img src="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="" class="mb-3 mx-auto ">
    <h2 class="text-2xl font-bold text-center ">GitHub Issues Tracker</h2>
    <p class="text-gray-500 text-center ">Sign in to manage your issues</p>
    <p class="mb-1">Username</p>
    <input class="p-1" type="text" name="" id="username" placeholder="Enter Username">
    <p class="text-blue-500">default : admin</p>
    <p>Password</p>
    <input type="text" name="" placeholder="Enter password" id="password" class="p-1">
    <p class="text-blue-500">default : admin123</p>

    <button  class="bg-blue-600 text-center hover: cursor-pointer p-2 rounded-lg m-2 w-full" type="button" onclick="login()">sign in</button>
   <div class="text-center"> <p class="text-center">OR</p>
    <p class="text-gray-500 mb-2">demo credentials:  </p>
    <p class="text-gray-700">Username: admin <br>
    Password: admin123</p></div>
 </div>
</div>
 <script src="./script.js"></script>
</body>
</html>
